<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>NexusAI | 通用智能大脑</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(20, 20, 25, 0.9);
            --accent-color: #a371ff;
            --text-main: #ffffff;
            --text-dim: #a1a1a6;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "SF Pro Display", -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(163, 113, 255, 0.1) 0%, transparent 80%);
            z-index: -1;
        }

        .nav-link { position: absolute; top: 25px; left: 40px; color: var(--text-dim); text-decoration: none; font-size: 14px; }

        header { margin-top: 40px; text-align: center; width: 100%; }
        header h1 { font-size: 72px; font-weight: 800; letter-spacing: -0.04em; background: linear-gradient(180deg, #fff 40%, var(--accent-color) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }

        #main-container {
            width: 95%; max-width: 1100px; flex: 1;
            display: flex; flex-direction: column; margin: 30px 0;
        }

        #chat-window {
            flex: 1; background: var(--card-bg); backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px;
            padding: 40px; overflow-y: auto; box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            display: flex; flex-direction: column;
            min-width: 100%; box-sizing: border-box;
        }

        #output { width: 100%; line-height: 1.8; font-size: 20px; font-weight: 300; white-space: pre-wrap; }

        .input-wrapper { position: relative; margin-top: 30px; margin-bottom: 20px; width: 100%; }
        input { width: 100%; height: 72px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 22px; padding: 0 100px 0 30px; color: white; font-size: 18px; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--accent-color); }

        button { position: absolute; right: 15px; top: 15px; height: 42px; background: var(--accent-color); color: white; border: none; border-radius: 12px; padding: 0 25px; cursor: pointer; font-weight: 600; }

        .cursor { display: inline-block; width: 3px; height: 22px; background: var(--accent-color); margin-left: 5px; animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<a href="index.html" class="nav-link">← 切换至专业知识库</a>

<header>
    <h1>NexusAI</h1>
    <p style="color:var(--text-dim)">通用智能对话系统</p>
</header>

<div id="main-container">
    <div id="chat-window">
        <div id="output">你好，我是 NexusAI。你想聊聊什么？</div>
    </div>

    <div class="input-wrapper">
        <input type="text" id="userInput" placeholder="在此输入您的问题..." onkeydown="if(event.keyCode==13) send()">
        <button onclick="send()">发送</button>
    </div>
</div>

<script>
    const chatId = "chat-" + Math.random().toString(36).substring(2, 10);

    function send() {
        const input = document.getElementById('userInput');
        const output = document.getElementById('output');
        const msg = input.value;
        if(!msg) return;

        output.innerHTML = '<span class="cursor"></span>';
        input.value = "";

        // 💡 重点：URL 参数必须是 message (对应 AIController)
        const url = `/ai/chat/stream?message=${encodeURIComponent(msg)}&chatId=${chatId}`;
        const es = new EventSource(url);

        let content = "";
        es.onmessage = (e) => {
            content += e.data;
            output.innerHTML = content + '<span class="cursor"></span>';
            const win = document.getElementById('chat-window');
            win.scrollTop = win.scrollHeight;
        };
        es.onerror = () => {
            es.close();
        };
    }
</script>
</body>
</html>
