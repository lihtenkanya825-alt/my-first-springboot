<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAI | 智能知识中台</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(20, 20, 25, 0.9);
            --accent-color: #0071e3;
            --text-main: #f5f5f7;
            --text-dim: #86868b;
            --success-green: #34c759;
            --error-red: #ff453a;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 113, 227, 0.12) 0%, transparent 80%);
            z-index: -1;
        }

        .nav-link { position: absolute; top: 25px; right: 40px; color: var(--text-dim); text-decoration: none; font-size: 14px; transition: color 0.3s; z-index: 10; }
        .nav-link:hover { color: #fff; }

        header { margin-top: 40px; text-align: center; width: 100%; }
        header h1 { font-size: 72px; font-weight: 800; letter-spacing: -0.04em; background: linear-gradient(180deg, #fff 40%, #555 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }

        #main-container {
            width: 95%;
            max-width: 1100px;
            flex: 1;
            display: flex;
            flex-direction: column;
            margin: 20px 0;
            position: relative;
            z-index: 1;
        }

        #chat-window {
            flex: 1;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 40px;
            overflow-y: auto;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .upload-area { margin-bottom: 20px; text-align: center; width: 100%; }
        .upload-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 10px 24px; border-radius: 20px; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .upload-btn:hover { border-color: var(--accent-color); background: rgba(0, 113, 227, 0.1); }

        #uploadStatus { font-size: 13px; margin-top: 10px; min-height: 20px; transition: all 0.3s; }

        .answer-text { width: 100%; line-height: 1.8; font-size: 19px; font-weight: 300; white-space: pre-wrap; }

        .input-area { position: relative; margin: 20px 0 30px 0; width: 100%; }
        input[type="text"] { width: 100%; height: 72px; background: rgba(44, 44, 46, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 22px; padding: 0 100px 0 30px; color: white; font-size: 18px; outline: none; box-sizing: border-box; }

        .send-btn { position: absolute; right: 15px; top: 15px; height: 42px; background: var(--accent-color); color: white; border: none; border-radius: 12px; padding: 0 25px; cursor: pointer; font-weight: 600; }
        .cursor { display: inline-block; width: 2px; height: 20px; background: var(--accent-color); margin-left: 5px; animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<a href="chat.html" class="nav-link">切换至通用智能大脑 →</a>

<header>
    <h1>NexusAI</h1>
    <p style="color:var(--text-dim)">专业知识库检索系统</p>
</header>

<div id="main-container">
    <div class="upload-area">
        <input type="file" id="fileInput" style="display: none;" accept=".pdf" onchange="uploadFile()">
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📁 喂入新知识 (PDF)</button>
        <div id="uploadStatus"></div>
    </div>

    <div id="chat-window">
        <div id="output" class="answer-text">你好，我是 NexusAI 专业助理。请上传文档或直接提问。</div>
    </div>

    <div class="input-area">
        <input type="text" id="question" placeholder="输入问题..." onkeydown="if(event.keyCode==13) ask()">
        <button class="send-btn" onclick="ask()">发送</button>
    </div>
</div>

<script>
    const chatId = "session-" + Math.random().toString(36).substring(2, 10);

    // [v3.2] 增强型异步上传与状态轮询
    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('uploadStatus');
        if (!fileInput.files[0]) return;

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        status.style.color = "var(--text-dim)";
        status.innerText = "📤 正在上传文件...";

        try {
            // 1. 发起上传请求，获取 TaskID
            const res = await fetch('/ai/upload', { method: 'POST', body: formData });
            const taskId = await res.text();

            // 2. 开启定时器轮询后端 Redis 中的任务状态
            const pollInterval = setInterval(async () => {
                try {
                    const statusRes = await fetch(`/ai/upload/status/${taskId}`);
                    const currentStatus = await statusRes.text();

                    if (currentStatus === "PROCESSING") {
                        status.innerText = "⏳ 后台正在进行向量化切片...";
                    } else if (currentStatus === "COMPLETED") {
                        status.style.color = "var(--success-green)";
                        status.innerText = "✅ 知识接入成功！AI 已学会新文档。";
                        clearInterval(pollInterval); // 停止轮询
                        setTimeout(() => status.innerText = "", 5000);
                    } else if (currentStatus.startsWith("FAILED")) {
                        status.style.color = "var(--error-red)";
                        status.innerText = "❌ 解析失败: " + currentStatus;
                        clearInterval(pollInterval);
                    }
                } catch (e) {
                    console.error("Polling error:", e);
                }
            }, 1000); // 每秒查询一次

        } catch (e) {
            status.style.color = "var(--error-red)";
            status.innerText = "❌ 链接服务器失败";
        }
    }

    function ask() {
        const input = document.getElementById('question');
        const output = document.getElementById('output');
        const q = input.value;
        if (!q) return;

        output.innerHTML = '<span class="cursor"></span>';
        input.value = "";

        const url = `/ai/rag/stream?question=${encodeURIComponent(q)}&chatId=${chatId}`;
        const es = new EventSource(url);

        let fullAnswer = "";
        es.onmessage = (e) => {
            fullAnswer += e.data;
            output.innerHTML = fullAnswer + '<span class="cursor"></span>';
            const win = document.getElementById('chat-window');
            win.scrollTop = win.scrollHeight;
        };
        es.onerror = () => {
            output.innerHTML = fullAnswer;
            es.close();
        };
    }
</script>
</body>
</html>
