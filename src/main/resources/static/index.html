<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAI | 智能知识中台</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(28, 28, 30, 0.7);
            --accent-color: #0071e3; /* Apple Blue */
            --text-main: #f5f5f7;
            --text-dim: #86868b;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 影视飓风风格背景光晕动效 */
        body::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 113, 227, 0.15) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
            z-index: -1;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* [v2.5-UI增强] 导航链接样式 */
        .nav-link {
            position: absolute;
            top: 20px;
            right: 40px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
            z-index: 10;
        }
        .nav-link:hover { color: #fff; }

        header {
            margin-top: 50px;
            text-align: center;
            animation: fadeInDown 1s ease-out;
        }

        header h1 {
            font-size: 42px;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(180deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-dim);
            font-size: 18px;
        }

        /* 聊天主容器 */
        #main-container {
            width: 90%;
            max-width: 800px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 1;
            min-height: 0; /* 防止溢出 */
        }

        /* [v2.5-UI增强] 修复滚动逻辑 */
        #chat-window {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            flex: 1; /* 自动撑开 */
            overflow-y: auto; /* 💡 开启滚动 */
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            scroll-behavior: smooth;
        }

        /* 💡 自定义滚动条（蓝色调） */
        #chat-window::-webkit-scrollbar { width: 4px; }
        #chat-window::-webkit-scrollbar-track { background: transparent; }
        #chat-window::-webkit-scrollbar-thumb {
            background: rgba(0, 113, 227, 0.3);
            border-radius: 10px;
        }

        .answer-text {
            line-height: 1.6;
            font-size: 18px;
            color: #ffffff;
            white-space: pre-wrap;
            padding-bottom: 20px;
        }

        /* 像苹果一样的输入框 */
        .input-area {
            position: relative;
            margin-bottom: 40px;
        }

        input {
            width: 100%;
            background: rgba(44, 44, 46, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 16px 20px;
            color: white;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            border-color: var(--accent-color);
            background: rgba(56, 56, 58, 1);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.3);
        }

        button {
            position: absolute;
            right: 8px;
            top: 8px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 500;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.95); }

        /* 打字机光标效果 */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 18px;
            background: var(--accent-color);
            margin-left: 4px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<!-- [v2.5-UI增强] 跳转链接 -->
<a href="chat.html" class="nav-link">切换至通用智能大脑 →</a>

<header>
    <h1>NexusAI</h1>
    <p>探索私有知识的无限可能</p>
</header>

<div id="main-container">
    <div id="chat-window">
        <div id="output" class="answer-text">你好，我是 NexusAI。请问有什么可以帮您？</div>
    </div>

    <div class="input-area">
        <input type="text" id="question" placeholder="输入问题，例如：公司周五有什么福利？" onkeydown="if(event.keyCode==13) ask()">
        <button onclick="ask()">发送</button>
    </div>
</div>

<script>
    function ask() {
        const questionInput = document.getElementById('question');
        const outputDiv = document.getElementById('output');
        const chatWin = document.getElementById('chat-window');
        const q = questionInput.value;

        if (!q) return;

        // 初始交互动效
        outputDiv.innerHTML = '<span class="cursor"></span>';
        questionInput.value = "";

        // 💡 建立 SSE 连接
        const eventSource = new EventSource(`/ai/rag/stream?question=${encodeURIComponent(q)}`);

        let fullAnswer = "";

        eventSource.onmessage = (event) => {
            // 实时接收 Token 并渲染
            fullAnswer += event.data;
            outputDiv.innerHTML = fullAnswer + '<span class="cursor"></span>';

            // [v2.5-UI增强] 自动追踪滚动到最底部
            chatWin.scrollTop = chatWin.scrollHeight;
        };

        eventSource.onerror = () => {
            // 结束时移除光标
            outputDiv.innerHTML = fullAnswer;
            eventSource.close();
        };
    }
</script>
</body>
</html>
